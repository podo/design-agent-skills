name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Verify VERSION matches package.json
        run: |
          VER=$(cat VERSION)
          PKG=$(jq -r '.version' package.json)
          if [ "$VER" != "$PKG" ]; then
            echo "VERSION ($VER) does not match package.json ($PKG) — update both atomically"
            exit 1
          fi

      - run: npm test

      - name: Build skills-only zip
        run: |
          TAG=${{ github.ref_name }}
          git archive --format=zip HEAD skills/ > design-agent-skills-${TAG}.zip

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          TAG=${{ github.ref_name }}
          VERSION="${TAG#v}"
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release-notes.md
          # If no section found, use a minimal default
          if [ ! -s release-notes.md ]; then
            echo "Release ${TAG}" > release-notes.md
          fi
          echo "notes_file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release with skills zip
        run: |
          TAG=${{ github.ref_name }}
          gh release create "${TAG}" \
            "design-agent-skills-${TAG}.zip" \
            --title "${TAG}" \
            --notes-file release-notes.md \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}

      - run: npm publish --access public --provenance
