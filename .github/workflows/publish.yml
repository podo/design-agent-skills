name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify VERSION matches package.json
        run: |
          VER=$(cat VERSION)
          PKG=$(jq -r '.version' package.json)
          if [ "$VER" != "$PKG" ]; then
            echo "VERSION ($VER) does not match package.json ($PKG) — update both atomically"
            exit 1
          fi

      - run: npm test

      - name: Build skills-only zip
        run: |
          TAG=${{ github.event.release.tag_name }}
          git archive --format=zip HEAD skills/ > design-agent-skills-${TAG}.zip

      - name: Attach skills zip to release
        run: gh release upload ${{ github.event.release.tag_name }} design-agent-skills-${{ github.event.release.tag_name }}.zip
        env:
          GH_TOKEN: ${{ github.token }}

      - run: npm publish --access public --provenance
