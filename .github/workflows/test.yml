name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run test suite
        run: npm test

      - name: Validate README skills table
        run: node scripts/generate-readme-table.mjs --check

      - name: Validate README skill count
        run: |
          node --input-type=module << 'EOF'
          import fs from 'node:fs';
          import path from 'node:path';
          const SKILLS_DIR = path.resolve('.', 'skills');
          const dirs = fs.readdirSync(SKILLS_DIR).filter(n =>
            fs.statSync(path.join(SKILLS_DIR, n)).isDirectory()
          );
          let nonRouter = 0;
          for (const name of dirs) {
            const stub = path.join(SKILLS_DIR, name, 'stub.yaml');
            if (!fs.existsSync(stub)) continue;
            const raw = fs.readFileSync(stub, 'utf8');
            if (!/^type:\s*router/m.test(raw)) nonRouter++;
          }
          const readme = fs.readFileSync('README.md', 'utf8');
          const m = readme.match(/^(\d+) skills covering/m);
          if (!m) { console.error('Cannot find "N skills covering" in README.md line 4'); process.exit(1); }
          const readmeCount = Number(m[1]);
          if (readmeCount !== nonRouter) {
            console.error(`README says ${readmeCount} skills but found ${nonRouter} non-router stubs in skills/`);
            process.exit(1);
          }
          console.log(`OK — README count (${nonRouter}) matches actual catalogue`);
          EOF
